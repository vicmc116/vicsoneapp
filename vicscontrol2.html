<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1b1b1b, #0a0a0a);
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  display: flex;
  gap: 20px;
}

.panel {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 20px;
}

.left { width: 360px; }
.middle { width: 300px; }
.right { width: 420px; }

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

input {
  background: rgba(255,255,255,0.08);
  color: #fff;
}

button {
  background: rgba(255,255,255,0.12);
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.18);
}

.user {
  padding: 10px;
  margin: 6px 0;
  background: rgba(0,0,0,0.25);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.user:hover {
  background: rgba(255,255,255,0.1);
}

.badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  margin-left: 6px;
}

.online {
  background: rgba(80,255,160,0.15);
  color: #7CFFB2;
}

.offline {
  background: rgba(120,120,120,0.2);
  color: #bbb;
}

.blocked {
  background: rgba(255,80,80,0.2);
  color: #ff6b6b;
}

.trial {
  background: rgba(255,200,80,0.15);
  color: #ffd37a;
}

.paid {
  background: rgba(80,255,160,0.15);
  color: #7CFFB2;
}

#output, #fullBox {
  white-space: pre-wrap;
  background: rgba(0,0,0,0.25);
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  min-height: 180px;
}

.logItem {
  background: rgba(0,0,0,0.25);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

#auditBox {
  margin-top: 10px;
}

#trialAdjust {
  width: 120px;
}
</style>
</head>
<script>
async function checkAdmin() {
    const password = prompt("Admin password:");

    const res = await fetch("/.netlify/functions/verify-admin", {
        headers: {
            authorization: password
        }
    });

    if (!res.ok) {
        document.body.innerHTML = "<h1>Access Denied</h1>";
        throw new Error("Unauthorized");
    }
}

checkAdmin();
</script>
<body>

<div class="container">

  <!-- USERS LIST -->
  <div class="panel middle">

    <h3>Users</h3>

    <button onclick="loadUsers()">Refresh</button>

    <div id="usersBox">LOADING...</div>

  </div>

  <!-- MAIN CONTROL -->
  <div class="panel left">

    <h3>User Control</h3>

    <input id="email" placeholder="email">
    <button onclick="loadUser()">Load</button>

    <div id="output">READY</div>

    <h4>Actions</h4>

    <button onclick="action('block')">Block</button>
    <button onclick="action('unblock')">Unblock</button>
    <button onclick="action('upgrade')">Upgrade</button>
    <button onclick="action('reset_trial')">Reset Trial</button>
    <button onclick="action('delete')">Delete User</button>

    <br><br>

    <input id="trialAdjust" placeholder="± days">
    <button onclick="adjustTrial()">Adjust Trial</button>

  </div>

  <!-- AUDIT -->
  <div class="panel right">

    <h3>Audit</h3>

    <button onclick="loadAudit()">Load</button>

    <div id="auditBox">READY</div>

  </div>

  <!-- FULL DATA -->
  <div class="panel right">

    <h3>Full User Data</h3>

    <button onclick="loadFullUser()">Load Full Data</button>

    <div id="fullBox">READY</div>

  </div>

</div>

<script>

const ADMIN_KEY = "victorscarpulla212:";

/* TIME AGO */
function timeAgo(ms) {
  if (!ms) return "never";

  const diff = Date.now() - Number(ms);

  const sec = Math.floor(diff / 1000);
  const min = Math.floor(sec / 60);
  const hr = Math.floor(min / 60);

  if (sec < 60) return `seen ${sec}s ago`;
  if (min < 60) return `seen ${min}m ago`;
  return `seen ${hr}h ago`;
}

/* USERS (FIXED ONLINE LOGIC RESTORED) */
async function loadUsers() {

  const res = await fetch("/.netlify/functions/list-users");
  const data = await res.json();

  const now = Date.now();
  const box = document.getElementById("usersBox");

  box.innerHTML = data.users.map(u => {

    let status = "trial";

    if (u.blocked) {
      status = "blocked";
    } else if (u.license === "PAID") {
      status = "paid";
    }

    let seenText = "";
    let onlineBadge = "";

    if (u.last_seen) {

      seenText = `<div class="small">${timeAgo(u.last_seen)}</div>`;

      const diff = now - Number(u.last_seen);

      if (diff < 120000) {
        onlineBadge = `<span class="badge online">ONLINE</span>`;
      }
    }

    return `
      <div class="user" onclick="selectUser('${u.email}')">
        ${u.email}
        ${seenText}
        ${onlineBadge}
        <span class="badge ${status}">
          ${status.toUpperCase()}
        </span>
      </div>
    `;
  }).join("");
}

function selectUser(email) {
  document.getElementById("email").value = email;
  loadUser();
}

/* USER */
async function loadUser() {

  const email = document.getElementById("email").value.trim();
  if (!email) return;

  const res = await fetch(
    `/.netlify/functions/admin-get-user?email=${encodeURIComponent(email)}`
  );

  const data = await res.json();

  document.getElementById("output").innerText =
    "EMAIL: " + data.email + "\nLICENSE: " + data.license;
}

/* ACTION */
async function action(type) {

  const email = document.getElementById("email").value.trim();
  if (!email) return;

  await fetch("/.netlify/functions/admin-action", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ email, action: type })
  });

  loadUsers();
}

/* TRIAL */
async function adjustTrial() {

  const email = document.getElementById("email").value.trim();
  const days = Number(document.getElementById("trialAdjust").value);

  if (!email) return;

  await fetch("/.netlify/functions/admin-action", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({
      email,
      action: "adjust_trial_days",
      days
    })
  });

  loadUser();
}

/* AUDIT */
async function loadAudit() {

  const email = document.getElementById("email").value.trim();
  if (!email) return;

  const res = await fetch(
    `/.netlify/functions/get-audit?email=${encodeURIComponent(email)}`
  );

  const data = await res.json();

  document.getElementById("auditBox").innerHTML =
    (data.logs || []).map(l =>
      `<div class="logItem">
        <b>${l.action}</b><br>
        <div class="small">${new Date(l.time).toLocaleString()}</div>
      </div>`
    ).join("");
}

/* FULL DATA */
async function loadFullUser() {

  const email = document.getElementById("email").value.trim();
  if (!email) return;

  const res = await fetch(
    `/.netlify/functions/admin-get-full-user?email=${encodeURIComponent(email)}`
  );

  const data = await res.json();

  document.getElementById("fullBox").innerText =
    "EMAIL: " + data.email + "\n" +
    "LICENSE: " + data.license + "\n" +
    "TOTAL SPENT: $" + (data.total_spent || 0);
}

loadUsers();

</script>

</body>
</html>
