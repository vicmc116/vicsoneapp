<!DOCTYPE html>
<html>
<head>
  <title>Purchase Test</title>
</head>

<body style="font-family: Arial; padding: 20px">

<h2>Test Purchase System</h2>

<button onclick="sendPurchase()">Send Test Purchase</button>

<pre id="out" style="margin-top:20px; background:#111; color:#0f0; padding:10px;"></pre>

<script>
async function getIP() {
  try {
    // simple public IP lookup (safe for testing)
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch (e) {
    return "unknown";
  }
}

async function sendPurchase() {

  const ip = await getIP();

  const payload = {
    email: "test@example.com",
    name: "John Smith",

    product_id: "pro_license",
    product_name: "Pro License",

    amount: 29.99,
    currency: "USD",

    ip: ip
  };

  fetch("http://localhost:8888/.netlify/functions/create-purchase", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("out").textContent =
      JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById("out").textContent = "ERROR: " + err;
  });
}
</script>

</body>
</html>
