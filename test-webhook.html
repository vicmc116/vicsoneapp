<!DOCTYPE html>
<html>
<body>

<h3>Webhook Test</h3>

<input id="email" placeholder="email" />
<button onclick="send()">Simulate Payment</button>

<script>
async function send() {
  const email = document.getElementById("email").value;

  const res = await fetch("/.netlify/functions/stripe-webhook", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-test-webhook": "true"
    },
    body: JSON.stringify({ email })
  });

  const text = await res.text();
  alert(text);
}
</script>

</body>
</html>
